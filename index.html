<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>КиндерБанк</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-accent: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
            --accent-neon: #00f2fe;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .balance-card {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.2) 0%, rgba(147, 51, 234, 0.2) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 22px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .balance-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .balance-amount {
            font-size: 38px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }

        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 16px;
        }

        h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #fff;
        }
        .btn {
            width: 100%;
            background: linear-gradient(90deg, #4f46e5 0%, #7c3aed 100%);
            border: none;
            border-radius: 14px;
            padding: 14px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-success {
            background: linear-gradient(90deg, #10b981 0%, #059669 100%);
        }

        .btn-outline {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .input-group {
            margin-bottom: 12px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 14px;
            color: #fff;
            font-size: 15px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #no-internet-screen {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(239, 68, 68, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 9999;
            font-size: 14px;
            font-weight: 500;
        }

        .hidden {
            display: none !important;
        }

        .deposit-progress {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 6px;
        }

        .deposit-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-neon), var(--accent-green));
            width: 0%;
        }

        #game-zone {
            width: 100%;
            height: 200px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            border: 1px dashed var(--glass-border);
            margin-top: 10px;
        }

        .coin {
            width: 36px;
            height: 36px;
            background: #f59e0b;
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
        }

        .receipt-box {
            background: #fff;
            color: #1e293b;
            border-radius: 16px;
            padding: 16px;
            margin-top: 12px;
            font-family: monospace;
            border-left: 4px solid var(--accent-green);
        }
    </style>
</head>
<body>

    <div id="no-internet-screen" class="hidden">
        ⚠️ Офлайн режим. Банк работает автономно!
    </div>

    <div class="app-container">

        <div class="balance-card">
            <div class="balance-title">Текущий баланс КиндерБанка</div>
            <div class="balance-amount"><span id="main-balance">0.00</span> ₽</div>
        </div>

        <div class="glass-panel">
            <h2>💸 Денежные переводы</h2>
            <div style="margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                <div class="input-group">
                    <label>Сумма перевода (₽)</label>
                    <input type="number" id="transfer-amount" placeholder="Сумма">
                </div>
                <div class="input-group">
                    <label>Получатель</label>
                    <input type="text" id="transfer-recipient" placeholder="Имя">
                </div>
                <button class="btn" onclick="makeTransfer()">Отправить и создать чек</button>
            </div>
            <div>
                <div class="input-group">
                    <label>Активировать чек (Введи код чека)</label>
                    <input type="text" id="redeem-code" placeholder="Например: KB-123456">
                </div>
                <button class="btn btn-success" onclick="redeemReceipt()">Принять чек и получить деньги</button>
            </div>
            <div id="receipt-container" class="hidden"></div>
        </div>

        <div class="glass-panel">
            <h2>💼 Биржа заданий</h2>
            <div id="parent-zone" style="margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid rgba(255,255,255,0.1);">
                <div class="input-group">
                    <label>Пароль Родителя</label>
                    <input type="password" id="parent-pass-create" placeholder="Пароль">
                </div>
                <div class="input-group">
                    <label>Название задания</label>
                    <input type="text" id="job-title" placeholder="Что сделать?">
                </div>
                <div class="input-group">
                    <label>Награда (₽)</label>
                    <input type="number" id="job-reward" placeholder="Сумма">
                </div>
                <button class="btn btn-outline" onclick="addJob()">Добавить задание</button>
            </div>
            <div id="jobs-list"></div>
        </div>
        <div class="glass-panel">
            <h2>📈 Почасовые Инвестиции</h2>
            <div class="input-group">
                <label>Сумма для вклада (₽)</label>
                <input type="number" id="deposit-amount" placeholder="Минимум 10 ₽">
            </div>
            <div class="input-group">
                <label>Срок вклада</label>
                <select id="deposit-time">
                    <option value="1">1 час (Доход +10%)</option>
                    <option value="3">3 часа (Доход +30%)</option>
                    <option value="5">5 часов (Доход +50%)</option>
                </select>
            </div>
            <button class="btn btn-success" id="start-deposit-btn" onclick="startDeposit()">Открыть вклад</button>
            <div id="deposit-status" class="hidden" style="margin-top:14px; text-align:center;">
                <span id="deposit-timer-text">Осталось: 0 сек</span>
                <div class="deposit-progress"><div id="deposit-bar" class="deposit-bar"></div></div>
            </div>
        </div>

        <div class="glass-panel">
            <h2>🎮 Игра: Поймай монету</h2>
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span>Поймано: <b id="game-score">0</b></span>
                <button class="btn btn-outline" id="game-btn" onclick="toggleGame()" style="width:auto; padding:4px 12px;">Старт</button>
            </div>
            <div id="game-zone"></div>
        </div>

        <div class="glass-panel">
            <h2>⚙️ Управление балансом</h2>
            <div class="input-group">
                <label>Секретный код операции</label>
                <input type="password" id="admin-code" placeholder="Код">
            </div>
            <div class="input-group">
                <label>Сумма операции</label>
                <input type="number" id="admin-amount" placeholder="Сумма">
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-success" onclick="modifyBalance('add')" style="flex:1;">+</button>
                <button class="btn" onclick="modifyBalance('sub')" style="flex:1; background:var(--danger);">-</button>
            </div>
        </div>

    </div>
    <script>
        let balance = parseFloat(localStorage.getItem('kb_balance'));
        if (isNaN(balance)) { balance = 0.00; }
        
        let jobs = JSON.parse(localStorage.getItem('kb_jobs')) || [];
        let activeReceipts = JSON.parse(localStorage.getItem('kb_active_receipts')) || {};

        let gameActive = false;
        let gameScore = 0;
        let gameTimer = null;

        const ADMIN_CODE = "вундия"; 
        const PARENT_PASSWORD = "ПетяМайнкрафт";

        // === СИСТЕМА ДИНАМИЧЕСКИХ СИНТЕТИЧЕСКИХ ЗВУКОВ ===
        function playSound(type) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'coin') { // Звук поимки монетки
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(587.33, ctx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'success') { // Звук успешной операции / выплаты
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'error') { // Звук ошибки / неверного пароля
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
                    osc.start(); osc.stop(ctx.currentTime + 0.2);
                }
            } catch (e) { console.log("Ошибка аудио:", e); }
        }

        function checkInternet() {
            if (navigator.onLine) {
                document.getElementById('no-internet-screen').classList.add('hidden');
            } else {
                document.getElementById('no-internet-screen').classList.remove('hidden');
            }
        }

        window.addEventListener('online', checkInternet);
        window.addEventListener('offline', checkInternet);

        document.addEventListener("DOMContentLoaded", function() {
            checkInternet();
            updateBalanceUI();
            renderJobs();
        });

        function updateBalanceUI() {
            document.getElementById('main-balance').innerText = balance.toFixed(2);
            localStorage.setItem('kb_balance', balance);
        }

        function makeTransfer() {
            const amountInput = document.getElementById('transfer-amount');
            const recipientInput = document.getElementById('transfer-recipient');
            const amount = parseFloat(amountInput.value);
            const recipient = recipientInput.value.trim();

            if (!amount || amount <= 0 || !recipient) { playSound('error'); return alert("Заполните поля!"); }
            if (amount > balance) { playSound('error'); return alert("Недостаточно денег!"); }

            balance -= amount;
            updateBalanceUI();

            const randomNum = Math.floor(100000 + Math.random() * 900000);
            const receiptCode = `KB-${randomNum}`;

            // Записываем в свойства чека сумму и метку "собственный чек" (isMine)
            activeReceipts[receiptCode] = { amount: amount, isMine: true };
            localStorage.setItem('kb_active_receipts', JSON.stringify(activeReceipts));
            playSound('success');

            const receiptContainer = document.getElementById('receipt-container');
            receiptContainer.innerHTML = `
                <div class="receipt-box">
                    <div style="text-align:center; font-weight:bold; margin-bottom: 6px;">🧾 ЧЕК КИHДЕРБАНК</div>
                    <div><b>КОД ЧЕКА:</b> <span style="color:var(--accent-neon); font-weight:bold; font-size:16px;">${receiptCode}</span></div>
                    <div><b>Получатель:</b> ${recipient}</div>
                    <div><b>Сумма:</b> -${amount.toFixed(2)} ₽</div>
                    <div style="font-size:11px; color:#64748b; margin-top:6px; text-align:center;">Скопируй КОД ЧЕКА и передай получателю!</div>
                </div>
            `;
            receiptContainer.classList.remove('hidden');
            amountInput.value = ""; recipientInput.value = "";
        }

        function redeemReceipt() {
            const codeInput = document.getElementById('redeem-code');
            const code = codeInput.value.trim();

            if (!code) { playSound('error'); return alert("Введите код чека!"); }

            if (activeReceipts.hasOwnProperty(code)) {
                const receiptData = activeReceipts[code];
                
                // Проверяем метку безопасности — если чек был создан на этом же устройстве, блокируем
                if (receiptData.isMine === true) {
                    playSound('error');
                    return alert("Безопасность: Вы не можете активировать собственный чек!");
                }

                const rewardAmount = receiptData.amount;
                balance += rewardAmount;
                updateBalanceUI();

                delete activeReceipts[code];
                localStorage.setItem('kb_active_receipts', JSON.stringify(activeReceipts));

                playSound('success');
                alert(`🎉 Успешно! Чек ${code} принят. Зачислено: +${rewardAmount.toFixed(2)} ₽`);
                codeInput.value = "";
                document.getElementById('receipt-container').classList.add('hidden');
            } else {
                playSound('error');
                alert("Ошибка! Такого чека не существует или он уже активирован.");
            }
        }
        function renderJobs() {
            const container = document.getElementById('jobs-list');
            container.innerHTML = "";
            if(jobs.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:13px; padding:10px;">Заданий пока нет. Добавьте их выше!</div>`;
                return;
            }
            jobs.forEach(job => {
                const item = document.createElement('div');
                item.className = "list-item";
                item.innerHTML = `
                    <div><div>${job.title}</div><div style="color:var(--accent-neon)">+${job.reward} ₽</div></div>
                    <button class="btn btn-success" style="width:auto; padding:6px 12px;" onclick="completeJob(${job.id})">OK</button>
                `;
                container.appendChild(item);
            });
            localStorage.setItem('kb_jobs', JSON.stringify(jobs));
        }

        function addJob() {
            const pass = document.getElementById('parent-pass-create').value;
            const title = document.getElementById('job-title').value.trim();
            const reward = parseFloat(document.getElementById('job-reward').value);

            if (pass !== PARENT_PASSWORD) { playSound('error'); return alert("Неверный пароль!"); }
            if (!title || !reward) { playSound('error'); return alert("Заполните поля!"); }

            jobs.push({ id: Date.now(), title: title, reward: reward });
            renderJobs();
            playSound('success');
            document.getElementById('job-title').value = ""; document.getElementById('job-reward').value = "";
        }

        function completeJob(id) {
            const pass = prompt("Введите родительский пароль:");
            if (pass !== PARENT_PASSWORD) { playSound('error'); return alert("Неверный пароль!"); }

            const idx = jobs.findIndex(j => j.id === id);
            if (idx !== -1) {
                balance += jobs[idx].reward;
                updateBalanceUI();
                jobs.splice(idx, 1);
                renderJobs();
                playSound('success');
            }
        }

        function startDeposit() {
            const amountInput = document.getElementById('deposit-amount');
            const amount = parseFloat(amountInput.value);
            const hours = parseInt(document.getElementById('deposit-time').value);

            if (!amount || amount < 10 || amount > balance) { playSound('error'); return alert("Некорректная сумма!"); }

            balance -= amount; updateBalanceUI();
            playSound('success');

            let pct = hours * 0.10;
            const reward = amount + (amount * pct);
            let totalSeconds = hours * 3600;

            document.getElementById('start-deposit-btn').disabled = true;
            const statusZone = document.getElementById('deposit-status');
            const bar = document.getElementById('deposit-bar');
            
            statusZone.classList.remove('hidden');
            bar.style.width = "0%";
            setTimeout(() => { bar.style.transition = `width ${totalSeconds}s linear`; bar.style.width = "100%"; }, 50);

            let left = totalSeconds;
            
            function formatTime(sec) {
                let h = Math.floor(sec / 3600);
                let m = Math.floor((sec % 3600) / 60);
                let s = sec % 60;
                return `${h}ч ${m}м ${s}с`;
            }

            document.getElementById('deposit-timer-text').innerText = `Осталось: ${formatTime(left)}`;

            const interval = setInterval(() => {
                left--;
                document.getElementById('deposit-timer-text').innerText = `Осталось: ${formatTime(left)}`;
                if (left <= 0) {
                    clearInterval(interval);
                    balance += reward; updateBalanceUI();
                    playSound('success');
                    alert(`Вклад закрыт! Получено: +${reward.toFixed(2)} ₽ (Прибыль: +${(hours*10)}%)`);
                    statusZone.classList.add('hidden');
                    bar.style.transition = "none";
                    document.getElementById('start-deposit-btn').disabled = false;
                }
            }, 1000);
        }

        function toggleGame() {
            const btn = document.getElementById('game-btn');
            if (gameActive) { 
                gameActive = false; 
                clearTimeout(gameTimer); 
                document.getElementById('game-zone').innerHTML = ""; 
                balance += gameScore * 0.5; 
                updateBalanceUI(); 
                if (gameScore > 0) playSound('success');
                btn.innerText = "Старт"; 
            }
            else { 
                gameActive = true; 
                gameScore = 0; 
                document.getElementById('game-score').innerText = 0; 
                btn.innerText = "Стоп"; 
                spawnCoin(); 
            }
        }

        function spawnCoin() {
            if (!gameActive) return;
            const zone = document.getElementById('game-zone'); zone.innerHTML = "";
            const coin = document.createElement('div'); coin.className = "coin"; coin.innerText = "₽";
            coin.style.left = Math.random() * (zone.clientWidth - 40) + "px";
            coin.style.top = Math.random() * (zone.clientHeight - 40) + "px";
            coin.onclick = () => { 
                gameScore++; 
                document.getElementById('game-score').innerText = gameScore; 
                playSound('coin'); 
                spawnCoin(); 
            };
            zone.appendChild(coin);
            clearTimeout(gameTimer); gameTimer = setTimeout(spawnCoin, 1200);
        }

        function modifyBalance(action) {
            const code = document.getElementById('admin-code').value;
            const amount = parseFloat(document.getElementById('admin-amount').value);
            if (code !== ADMIN_CODE || !amount) { playSound('error'); return alert("Ошибка!"); }
            balance = action === 'add' ? balance + amount : balance - amount;
            updateBalanceUI();
            playSound('success');
        }
    </script>
</body>
</html>
